<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let user = {
            name: "Sherwin M Castillo",
            age: 20,
            isStudent: true
        }


        for (let key in user) {
            console.log(key, user[key])
        }

        for (let propert of Object.keys(user)) {
            console.log(propert, user[propert])
        }

        for (let [key, value] of Object.entries(user)) {
            console.log(key, value)

        }


        // getting the property of the new object in existing object without acessing the inherited key
        let student = {
            name: "Sherwin",
            age: 21,
        }

        let Sti = Object.create(student)
        Sti.building = "B3106";
        Sti.location = "Santa Rosa Complex";

        for (let key in Sti) {
            if (Sti.hasOwnProperty(key)) {
                console.log(key)
            }
        }












    </script>
</body>

</html>
