<body>

    <script>
        let Animals = ['Cat', 'Dog', 'Snake', 'Birds']
        let animal;
        let Zoo = [];

        for (animal of Animals) {
            console.log(animal)
            Zoo.push(animal)
        }
        console.log('Nilagay sa container ng Zoo ang ' + Zoo)
        alert(`${Zoo}\n`)



        let days = [];
        let ask;
        let uppercaseDays;
        let wagstop = true;
        let notAllowed = [];
        let daysAllowed = ['LUNES', 'MONDAY', 'MARTES', 'TUESDAY', 'MIYERKULES', 'WEDNESDAY', 'HUWEBES', 'THURSDAY', 'BIYERNES', 'FRIDAY', 'SABADO', 'SATURDAY', 'LINGGO', 'SUNDAY']


        while (wagstop) {
            ask = prompt('Magbigay ka ng araw sa isang linggo ang mali spelling ay hindi tatangapin \nPress D pag gusto mo huminto');

            uppercaseDays = ask.toUpperCase();


            if (daysAllowed.includes(uppercaseDays)) {
                days.push(ask);
                console.log(days)
            }
            else if (uppercaseDays === 'D') {
                wagstop = false;
                break;  
            }
            else {
                alert("Your input not allowed");
                notAllowed.push(uppercaseDays);
            }


        }
        for (let day of days) {
            if (day.trim() === '') {
                alert("wala ka pang nilalagay ")
                console.log(day)
            } else {
                alert("makikita mo sa console ang na input mo");
                console.log(day)
            }
        }















    </script>
