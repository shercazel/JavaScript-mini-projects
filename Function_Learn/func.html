        // function with parameter 

        let name;

        let Course;

        let grades = 90;
        let remarks = true;

        console.log(profileStudent("Sherwin M Castillo", 12, "BSIT 701 A", 132123112, grades));

        function profileStudent(name, age, section, idnum, marks,) {
            return `Name: ${name}
                    Age: ${age}
                    Section: ${section}
                    ID NO: ${idnum}
                    Grades: ${marks}
                    Remark: ${gradeRemarks()}
                    `
                ;
        }
        function gradeRemarks() {
            switch (remarks) {
                case (grades > 0 && grades <= 59):
                    return "malapit na aral ka pa";
                    break;
                case (grades > 59 && grades <= 75):
                    return "good nag 2.5 ka";
                    break;
                case (grades > 75 && grades <= 83):
                    return "good nag 2 ka";
                    break;
                case (grades > 83 && grades <= 90):
                    return "galing siyet";
                    break;
                case (grades > 90 && grades <= 100):
                    return "May pang libre na sayo si mommy";
                    break;
                default:
                    return "Invalid Marks!"
                    break;
            }

        }
