        // exercise
        // Car Registration System

        class Car {
            constructor(brand, model, year, running) {
                this.brand = brand;
                this.model = model;
                this.year = year;
                this.running = running;
            }
            CarDetails() {
                console.log(`This car is a ${this.year} ${this.brand} ${this.model}`)
            }
            startEngine() {
                if (this.running === true) {
                    console.log("The Engine is Already Running")
                }
                else {
                    this.running = true
                    console.log(`Vroom! The Engine has Started`)
                }
            }
            stopEngine() {
                if (this.running === true) {
                    this.running = false;
                    console.log(`The Engine has Stopped!`)
                } else {
                    console.log(`The engine already off`)
                }
            }

        }

        const car = new Car('Honda Civic', 'honda1213', 2, false)
        car.CarDetails();
        car.startEngine();
        car.stopEngine();
        car.stopEngine();








    </script>
