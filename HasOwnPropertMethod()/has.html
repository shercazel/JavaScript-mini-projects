<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let person = {
            name: "Sherwin M Castillo",
            age: 20,
            isStudent: true
        }

        //meron silang sariling propoert
        console.log(person.hasOwnProperty("name"));
        console.log(person.hasOwnProperty("age"));
        console.log(person.hasOwnProperty("isStudent"));


        // let create a new object in the existing object
        // false kasi ini inherit nya nlng naman ang propert ni person
        // wala syang sariling property

        let user = Object.create(person);
        user.grade = "BSit"
        console.log(user.hasOwnProperty("name"));
        console.log(user.hasOwnProperty("age"));
        console.log(user.hasOwnProperty("isStudent"));
        // true kasi nag gawa tayo ng propert kay user
        console.log(user.hasOwnProperty("grade"));
        // eto naman is false kasi d nya pwede kunin ang property na meron si new object
        console.log(person.hasOwnProperty("grade"));



    </script>
</body>

</html>
