<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let number = [0, 1, 2, 3, 4, 5]
        let sum = 0;
        number.forEach(num => sum = sum + num)
        console.log(sum)

        let timesTwo = [0, 1, 2, 3, 4, 5]
        let times = 0;
        timesTwo.forEach(num => times = times * num)
        console.log(times);
        // result = 0

        timesTwo = [1, 2, 3, 4, 5]
        times = 1;
        timesTwo.forEach(num => times = times * num)
        console.log(times);
        // result 120










    </script>
</body>
