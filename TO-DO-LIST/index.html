<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
        }

        body {
            height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #Main-Container {
            height: 500px;
            width: 90%;
            max-width: 500%;
            border: 1px solid;
            padding: 2rem;
        }

        #inputContainer {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            column-gap: 10px;

        }

        input {
            width: 65%;
            height: 40px;
            padding-left: 5px;

        }

        button {
            height: 40px;
            width: 30%;

        }

        input,
        button {
            border-radius: 5px;
            border: solid 1px;
        }

        #listContainer {
            display: flex;
            flex-direction: column;
            list-style: none;
            font-size: 18px;
            margin-top: 10px;

        }
    </style>
</head>

<body>

    <h1>TO DO LIST</h1>
    <div id="Main-Container">
        <div id="inputContainer">
            <input type="text" name="to-do" id="toDoList" placeholder="Type your task">
            <button id="addBtn" type="button">Add</button>
        </div>
        <div id="listContainer">
        </div>
    </div>
    <script>
        let taskList = [];
        let addBtn = document.getElementById("addBtn");
        let listContainer = document.getElementById("listContainer");

        addBtn.addEventListener("click", function () {
            let addtask = document.getElementById("toDoList").value;

            if (addtask.trim() === "") {
                alert("Please enter a task");
                return;
            }

            taskList.push(addtask);
            renderTasks();
            document.getElementById("toDoList").value = "";
        });

        function renderTasks() {
            listContainer.innerHTML = ""; 

            taskList.forEach(function (task, index) {
                let createList = document.createElement("li");
                let removeBtn = document.createElement("button");

                createList.textContent = `${index + 1}. ${task}`;

                removeBtn.textContent = "Remove";

                removeBtn.addEventListener("click", function () {
                    taskList.splice(index, 1);
                    renderTasks();
                });

                createList.appendChild(removeBtn);
                listContainer.appendChild(createList);
            });
        }
    </script>

</body>

</html>
